<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Clicker Leaderboard</title>
  
  <!-- Tailwind CSS for styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen p-4 md:p-8">

  <!-- Loading State -->
  <div id="loadingScreen" class="fixed inset-0 flex items-center justify-center bg-slate-900 z-50">
    <i data-lucide="activity" class="w-10 h-10 animate-spin text-blue-500"></i>
  </div>

  <!-- Main Application (Hidden until loaded) -->
  <div id="appContent" class="max-w-4xl mx-auto space-y-8 hidden">
    
    <!-- Header -->
    <header class="text-center space-y-4 pt-8">
      <div class="inline-flex items-center justify-center p-4 bg-blue-500/10 rounded-full mb-2">
        <i data-lucide="trophy" class="w-12 h-12 text-blue-400"></i>
      </div>
      <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">
        Global Clicker
      </h1>
      <p class="text-slate-400 max-w-lg mx-auto">
        Join the leaderboard, click to increase your score, and compete with everyone in real-time.
      </p>
    </header>

    <main class="grid md:grid-cols-12 gap-8 items-start">
      
      <!-- Left Column: Actions -->
      <div class="md:col-span-5 space-y-6">
        
        <!-- Join Form (Shows when no profile) -->
        <div id="joinSection" class="bg-slate-800/50 backdrop-blur border border-slate-700/50 p-6 rounded-2xl shadow-xl block">
          
          <button
            id="googleLoginBtn"
            class="w-full flex items-center justify-center gap-3 bg-white hover:bg-slate-50 text-slate-900 px-6 py-3.5 rounded-xl font-bold transition-all shadow-md active:scale-[0.98]"
          >
            <svg class="w-5 h-5" viewBox="0 0 24 24">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Sign in with Google
          </button>

          <div class="my-6 flex items-center before:mt-0.5 before:flex-1 before:border-t before:border-slate-700/50 after:mt-0.5 after:flex-1 after:border-t after:border-slate-700/50">
            <p class="mx-4 mb-0 text-center font-semibold text-slate-500 text-sm">OR EMAIL</p>
          </div>

          <!-- Login/Signup Tabs -->
          <div class="flex gap-2 mb-6">
            <button id="tabLogin" class="flex-1 pb-2 border-b-2 border-blue-500 font-bold text-white transition-colors">Log In</button>
            <button id="tabSignup" class="flex-1 pb-2 border-b-2 border-slate-700 font-bold text-slate-400 transition-colors hover:text-slate-200">Sign Up</button>
          </div>
          
          <form id="emailAuthForm" class="space-y-4">
            <div id="usernameGroup" class="hidden">
              <label class="block text-sm font-medium text-slate-400 mb-2">Username</label>
              <input type="text" id="usernameInput" placeholder="e.g. PlayerOne" maxlength="15" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" />
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-400 mb-2">Email</label>
              <input type="email" id="emailInput" placeholder="you@email.com" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" required />
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-400 mb-2">Password</label>
              <input type="password" id="passwordInput" placeholder="••••••••" minlength="6" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" required />
            </div>
            <button type="submit" id="emailSubmitBtn" class="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-xl font-semibold transition-all disabled:opacity-50 active:scale-[0.98]">
              Log In
              <i data-lucide="arrow-right" class="w-5 h-5"></i>
            </button>
          </form>
        </div>

        <!-- Active Player Dashboard (Shows when joined) -->
        <div id="playerSection" class="bg-gradient-to-b from-blue-900/40 to-slate-800/50 backdrop-blur border border-blue-500/20 p-6 rounded-2xl shadow-xl text-center flex flex-col items-center hidden">
          
          <!-- Profile Info with Picture -->
          <div class="flex items-center justify-center gap-4 mb-6 bg-slate-900/50 w-full py-3 px-4 rounded-2xl border border-blue-500/20">
            <div class="relative group cursor-pointer flex-shrink-0" id="pfpContainer" title="Click to change profile picture">
              <img id="displayPfp" src="" class="w-16 h-16 rounded-full object-cover border-2 border-blue-500 shadow-lg bg-slate-800">
              <div class="absolute inset-0 bg-black/60 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity backdrop-blur-sm">
                <i data-lucide="camera" class="w-6 h-6 text-white"></i>
              </div>
              <input type="file" id="pfpUpload" accept="image/*" class="hidden">
            </div>
            
            <div class="text-left flex-1">
              <div class="text-xs font-medium text-blue-300 flex items-center gap-2 mb-0.5">
                <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div> Playing as
              </div>
              <div id="displayUsername" class="font-bold text-white text-xl truncate max-w-[150px]"></div>
            </div>
          </div>
          
          <div id="displayScore" class="text-6xl font-black text-white mb-8 tracking-tighter">0</div>
          
          <button
            id="clickButton"
            class="group relative w-48 h-48 rounded-full bg-gradient-to-b from-blue-500 to-indigo-600 hover:from-blue-400 hover:to-indigo-500 flex flex-col items-center justify-center shadow-[0_0_40px_rgba(59,130,246,0.3)] hover:shadow-[0_0_60px_rgba(59,130,246,0.5)] transition-all active:scale-95 border-4 border-blue-400/30"
          >
            <i data-lucide="mouse-pointer-click" class="w-12 h-12 text-white mb-2 opacity-80 group-hover:scale-110 transition-transform"></i>
            <span class="text-xl font-bold text-white">CLICK ME</span>
          </button>

          <!-- Account Actions (Logout / Deactivate) -->
          <div class="mt-8 pt-6 border-t border-slate-700/50 w-full flex flex-col sm:flex-row gap-4 justify-center items-center">
            <button id="logoutBtn" class="text-sm font-medium text-slate-400 hover:text-white transition-colors flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-slate-700/50">
              <i data-lucide="log-out" class="w-4 h-4"></i> Log Out
            </button>
            <button id="deleteAccountBtn" class="text-sm font-medium text-red-400 hover:text-red-300 transition-colors flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-red-500/10">
              <i data-lucide="trash-2" class="w-4 h-4"></i> Delete Account
            </button>
          </div>
        </div>
      </div>

      <!-- Right Column: Leaderboard -->
      <div class="md:col-span-7">
        <div class="bg-slate-800/30 border border-slate-700/50 rounded-2xl overflow-hidden shadow-xl">
          <div class="p-4 border-b border-slate-700/50 bg-slate-800/50 flex items-center justify-between">
            <h3 class="text-lg font-bold flex items-center gap-2">
              <i data-lucide="medal" class="w-5 h-5 text-yellow-500"></i>
              Top Players
            </h3>
            <span id="playerCount" class="text-xs font-medium text-slate-400 bg-slate-900 px-2 py-1 rounded-md">
              0 Players Online
            </span>
          </div>
          
          <div id="leaderboardList" class="divide-y divide-slate-700/30 max-h-[600px] overflow-y-auto">
            <!-- Leaderboard items will be injected here -->
          </div>
        </div>
      </div>
      
    </main>
  </div>

  <script type="module">
    // Import Firebase modules directly from CDN for standard HTML
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, deleteUser } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, getDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // =====================================================================
    // 🔥 GITHUB PAGES CONFIG 🔥
    // =====================================================================
    let firebaseConfig;
    if (typeof __firebase_config !== 'undefined') {
      firebaseConfig = JSON.parse(__firebase_config);
    } else {
      firebaseConfig = {
        apiKey: "AIzaSyBBMqL7mb5j0ZLm4WhcB09LmA8CJRGXHfI",
        authDomain: "testing-c7477.firebaseapp.com",
        projectId: "testing-c7477",
        storageBucket: "testing-c7477.firebasestorage.app",
        messagingSenderId: "743729171693",
        appId: "1:743729171693:web:86891606fc9392677ed0e4"
      };
    }

    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-github-app-id';

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();

    // App State
    let currentUser = null;
    let myProfile = null;
    let leaderboardData = [];
    let isSignupMode = false;
    let pendingUsername = null;
    let dbUnsubscribe = null;

    // DOM Elements
    const loadingScreen = document.getElementById('loadingScreen');
    const appContent = document.getElementById('appContent');
    const joinSection = document.getElementById('joinSection');
    const playerSection = document.getElementById('playerSection');
    const googleLoginBtn = document.getElementById('googleLoginBtn');
    
    // Email Auth Elements
    const tabLogin = document.getElementById('tabLogin');
    const tabSignup = document.getElementById('tabSignup');
    const emailAuthForm = document.getElementById('emailAuthForm');
    const usernameGroup = document.getElementById('usernameGroup');
    const usernameInput = document.getElementById('usernameInput');
    const emailInput = document.getElementById('emailInput');
    const passwordInput = document.getElementById('passwordInput');
    const emailSubmitBtn = document.getElementById('emailSubmitBtn');

    // Dashboard Elements
    const displayUsername = document.getElementById('displayUsername');
    const displayScore = document.getElementById('displayScore');
    const displayPfp = document.getElementById('displayPfp');
    const pfpContainer = document.getElementById('pfpContainer');
    const pfpUpload = document.getElementById('pfpUpload');
    const clickButton = document.getElementById('clickButton');
    const leaderboardList = document.getElementById('leaderboardList');
    const playerCount = document.getElementById('playerCount');
    const logoutBtn = document.getElementById('logoutBtn');
    const deleteAccountBtn = document.getElementById('deleteAccountBtn');

    // 1. Initialize Icons
    lucide.createIcons();

    // 2. Authentication Initialization
    async function initAuth() {
      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else if (typeof __firebase_config !== 'undefined') {
          await signInAnonymously(auth); 
        }
      } catch (error) {
        console.error("Authentication failed:", error);
      }
    }
    
    // 3. Auth State Observer
    onAuthStateChanged(auth, async (user) => {
      currentUser = user;
      
      if (user) {
        await checkAndCreateProfile(user);
      } else {
        if (dbUnsubscribe) {
          dbUnsubscribe();
          dbUnsubscribe = null;
        }
        myProfile = null;
        
        loadingScreen.classList.add('hidden');
        appContent.classList.remove('hidden');
        joinSection.classList.remove('hidden');
        playerSection.classList.add('hidden');
      }
    });

    initAuth();

    // Helper: Generate default robot avatar URL based on username
    function getDefaultAvatar(username) {
      return `https://api.dicebear.com/7.x/bottts/svg?seed=${encodeURIComponent(username)}&backgroundColor=1e293b`;
    }

    // 4. Ensure Database Profile Exists
    async function checkAndCreateProfile(user) {
      const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'leaderboard', user.uid);
      
      try {
        const userSnap = await getDoc(userRef);
        
        if (!userSnap.exists()) {
          const uName = pendingUsername || user.displayName || 'Player ' + Math.floor(Math.random() * 1000);
          
          const newProfile = {
            username: uName,
            score: 0,
            photoURL: user.photoURL || getDefaultAvatar(uName), // Google PFP or Robot PFP
            joinedAt: Date.now(),
            lastActive: Date.now()
          };
          await setDoc(userRef, newProfile);
        }
        
        pendingUsername = null; 
        setupDatabaseListener();
        
      } catch (error) {
        console.error("Error creating profile:", error);
        alert("Could not load player profile.");
      }
    }

    // 5. Database Real-time Listener
    function setupDatabaseListener() {
      if (!currentUser) return;
      if (dbUnsubscribe) dbUnsubscribe();

      const leaderboardCollection = collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard');
      
      dbUnsubscribe = onSnapshot(leaderboardCollection, (snapshot) => {
        const docs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        
        docs.sort((a, b) => (b.score || 0) - (a.score || 0));
        leaderboardData = docs;
        
        const existingProfile = docs.find(d => d.id === currentUser.uid);
        if (existingProfile) {
          myProfile = existingProfile;
          updateUIForActivePlayer();
        }

        renderLeaderboard();
        
        loadingScreen.classList.add('hidden');
        appContent.classList.remove('hidden');
      }, (error) => {
        console.error("Failed to fetch leaderboard:", error);
      });
    }

    // 6. TABS: Switch between Login and Signup
    tabLogin.addEventListener('click', () => {
      isSignupMode = false;
      tabLogin.classList.replace('border-slate-700', 'border-blue-500');
      tabLogin.classList.replace('text-slate-400', 'text-white');
      tabSignup.classList.replace('border-blue-500', 'border-slate-700');
      tabSignup.classList.replace('text-white', 'text-slate-400');
      
      usernameGroup.classList.add('hidden');
      usernameInput.removeAttribute('required');
      emailSubmitBtn.innerHTML = `Log In <i data-lucide="arrow-right" class="w-5 h-5"></i>`;
      lucide.createIcons();
    });

    tabSignup.addEventListener('click', () => {
      isSignupMode = true;
      tabSignup.classList.replace('border-slate-700', 'border-blue-500');
      tabSignup.classList.replace('text-slate-400', 'text-white');
      tabLogin.classList.replace('border-blue-500', 'border-slate-700');
      tabLogin.classList.replace('text-white', 'text-slate-400');
      
      usernameGroup.classList.remove('hidden');
      usernameInput.setAttribute('required', 'true');
      emailSubmitBtn.innerHTML = `Sign Up <i data-lucide="user-plus" class="w-5 h-5"></i>`;
      lucide.createIcons();
    });

    // 7. Manual Email/Password Submit
    emailAuthForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      
      emailSubmitBtn.disabled = true;
      emailSubmitBtn.innerHTML = `<i data-lucide="activity" class="w-5 h-5 animate-spin"></i> Processing...`;
      lucide.createIcons();

      try {
        if (isSignupMode) {
          pendingUsername = usernameInput.value.trim();
          await createUserWithEmailAndPassword(auth, email, password);
        } else {
          await signInWithEmailAndPassword(auth, email, password);
        }
      } catch (error) {
        console.error("Auth error:", error);
        if (error.code === 'auth/email-already-in-use') alert("An account with this email already exists!");
        else if (error.code === 'auth/invalid-credential') alert("Incorrect email or password.");
        else alert("Error: " + error.message);
      } finally {
        emailSubmitBtn.disabled = false;
        emailSubmitBtn.innerHTML = isSignupMode ? `Sign Up <i data-lucide="user-plus" class="w-5 h-5"></i>` : `Log In <i data-lucide="arrow-right" class="w-5 h-5"></i>`;
        lucide.createIcons();
      }
    });

    // 8. Google Login
    googleLoginBtn.addEventListener('click', async () => {
      googleLoginBtn.disabled = true;
      googleLoginBtn.innerHTML = `<i data-lucide="activity" class="w-5 h-5 animate-spin"></i> Signing in...`;
      lucide.createIcons();

      try {
        await signInWithPopup(auth, googleProvider);
      } catch (error) {
        console.error("Google Sign-In Error:", error);
        alert("Failed to sign in with Google.");
      } finally {
        googleLoginBtn.disabled = false;
        googleLoginBtn.innerHTML = `<svg class="w-5 h-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> Sign in with Google`;
      }
    });

    // 9. Change Profile Picture Setup
    pfpContainer.addEventListener('click', () => {
      pfpUpload.click();
    });

    pfpUpload.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file || !currentUser || !myProfile) return;

      // Ensure it's an image
      if (!file.type.startsWith('image/')) {
        alert("Please select an image file.");
        return;
      }

      // Show temporary loading UI
      displayPfp.style.opacity = '0.5';

      try {
        // Compress image client-side to keep under Firestore limits
        const compressedBase64 = await compressImage(file, 150); // Resize to max 150x150
        
        // Save directly to Firestore document
        const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'leaderboard', currentUser.uid);
        await setDoc(userRef, { ...myProfile, photoURL: compressedBase64 }, { merge: true });
        
      } catch (error) {
        console.error("Error updating profile picture:", error);
        alert("Failed to upload image. Please try a smaller file.");
      } finally {
        displayPfp.style.opacity = '1';
        pfpUpload.value = ''; // Reset input
      }
    });

    // Image Compressor to avoid hitting Firebase size limits
    function compressImage(file, maxSize) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;

            // Calculate new dimensions preserving aspect ratio
            if (width > height) {
              if (width > maxSize) {
                height *= maxSize / width;
                width = maxSize;
              }
            } else {
              if (height > maxSize) {
                width *= maxSize / height;
                height = maxSize;
              }
            }

            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            
            // Convert to base64 jpeg string (compressed to 80% quality)
            resolve(canvas.toDataURL('image/jpeg', 0.8));
          };
          img.onerror = reject;
          img.src = event.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // 10. Logout / Delete Account
    logoutBtn.addEventListener('click', async () => {
      if (confirm("Are you sure you want to log out?")) {
        await signOut(auth);
        passwordInput.value = ''; 
      }
    });

    deleteAccountBtn.addEventListener('click', async () => {
      if (confirm("WARNING: This will permanently delete your account and your score from the leaderboard. Are you absolutely sure?")) {
        try {
          const uid = currentUser.uid;
          const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'leaderboard', uid);
          await deleteDoc(userRef);
          await deleteUser(currentUser);
          alert("Your account has been deleted.");
        } catch (error) {
          console.error("Delete account error:", error);
          if (error.code === 'auth/requires-recent-login') {
            alert("For security reasons, you need to log out and log back in before you can delete your account.");
          } else {
            alert("Failed to delete account: " + error.message);
          }
        }
      }
    });

    // 11. Click Action
    clickButton.addEventListener('click', async () => {
      if (!currentUser || !myProfile) return;
      const newScore = (myProfile.score || 0) + 1;
      
      myProfile.score = newScore;
      displayScore.textContent = newScore.toLocaleString();

      try {
        const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'leaderboard', currentUser.uid);
        await setDoc(userRef, { ...myProfile, score: newScore, lastActive: Date.now() });
      } catch (error) {
        console.error("Error saving score:", error);
      }
    });

    // 12. UI Helpers
    function updateUIForActivePlayer() {
      joinSection.classList.add('hidden');
      joinSection.classList.remove('block');
      playerSection.classList.remove('hidden');
      
      displayUsername.textContent = myProfile.username;
      displayScore.textContent = myProfile.score.toLocaleString();
      
      // Update the profile picture
      if (myProfile.photoURL) {
        displayPfp.src = myProfile.photoURL;
      } else {
        displayPfp.src = getDefaultAvatar(myProfile.username);
      }
    }

    function renderLeaderboard() {
      playerCount.textContent = `${leaderboardData.length} Players Online`;
      
      if (leaderboardData.length === 0) {
        leaderboardList.innerHTML = `<div class="p-8 text-center text-slate-500">No players yet. Be the first to join!</div>`;
        return;
      }

      leaderboardList.innerHTML = leaderboardData.map((player, index) => {
        const isMe = currentUser && player.id === currentUser.uid;
        const rankClass = index === 0 ? 'bg-yellow-500/20 text-yellow-400 border border-yellow-500/50' : 
                          index === 1 ? 'bg-slate-300/20 text-slate-300 border border-slate-300/50' :
                          index === 2 ? 'bg-amber-700/20 text-amber-500 border border-amber-700/50' :
                          'bg-slate-800 text-slate-400';
                          
        const iconHtml = index === 0 ? `<i data-lucide="crown" class="w-4 h-4"></i>` : index + 1;
        const highlightClass = isMe ? 'bg-blue-500/10' : 'hover:bg-slate-700/20';
        const nameClass = isMe ? 'text-blue-400' : 'text-slate-200';
        const youTag = isMe ? `<span class="ml-2 text-xs bg-blue-600/30 text-blue-300 px-2 py-0.5 rounded-full">You</span>` : '';
        
        // Make sure older accounts without pictures still get an avatar
        const playerAvatar = player.photoURL || getDefaultAvatar(player.username);

        return `
          <div class="p-4 flex items-center justify-between transition-colors ${highlightClass}">
            <div class="flex items-center gap-4">
              <!-- Rank -->
              <div class="w-8 h-8 flex-shrink-0 rounded-full flex items-center justify-center font-bold text-sm ${rankClass}">
                ${iconHtml}
              </div>
              
              <!-- Profile Picture -->
              <img src="${escapeHtml(playerAvatar)}" class="w-10 h-10 flex-shrink-0 rounded-full object-cover border border-slate-600 bg-slate-800" alt="Avatar">
              
              <!-- Username -->
              <div class="flex flex-col truncate max-w-[120px] sm:max-w-[200px]">
                <span class="font-semibold ${nameClass} truncate">
                  ${escapeHtml(player.username)} ${youTag}
                </span>
              </div>
            </div>
            
            <!-- Score -->
            <div class="font-mono text-xl font-bold text-slate-300 pl-4">
              ${(player.score || 0).toLocaleString()}
            </div>
          </div>
        `;
      }).join('');
      
      lucide.createIcons();
    }

    function escapeHtml(unsafe) {
        return unsafe.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
